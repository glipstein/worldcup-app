name: Update team strength ratings

# Run manually from GitHub → Actions → "Update team strength ratings" → Run workflow.
# Fetches all historical international results, recomputes Elo ratings for every
# WC 2026 team, normalizes them to the app's 0-100 scale, and commits the
# updated teamStrength.ts.  No API key required.
#
# When to run: after each knockout round ends and results are settled.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print changes without committing (true = dry run)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute Elo ratings and patch teamStrength.ts
        run: node scripts/update-strengths.mjs

      - name: Show diff
        run: git diff src/lib/teamStrength.ts

      - name: Commit and push
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/teamStrength.ts
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: update team strengths from Elo ratings ($(date -u +%Y-%m-%d))"
          git push
