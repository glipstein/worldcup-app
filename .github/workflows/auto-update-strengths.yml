name: Auto-update team strengths and match odds

# Runs every 6 hours year-round (fast-exits outside the tournament window).
#
# Every run (unconditional):
#   • Fetches Polymarket match-specific odds for all WC 2026 fixtures
#     and rewrites src/lib/matchOdds.ts
#
# When ESPN shows a new stage just finished AND the 18-hour martj42 lag elapsed:
#   • Recomputes Elo ratings from martj42/international_results CSV
#   • Patches src/lib/teamStrength.ts with updated 0-100 strength values
#   • Updates .github/elo-update-state.json so the stage isn't re-processed
#
# Both changes (if any) are committed together and pushed, triggering a
# GitHub Pages deploy.
#
# You can also run manually:
#   Actions → "Auto-update team strengths and match odds" → Run workflow

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:         # manual trigger for testing

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 1: poll ESPN and decide whether a new round just finished ────────
      - name: Check whether a new stage has completed
        id: round_check
        continue-on-error: true   # don't abort the match-odds fetch if ESPN is flaky
        run: node scripts/check-round-complete.mjs

      # ── Step 2 (ALWAYS): fetch Polymarket match odds ─────────────────────────
      # Runs regardless of round completion — keeps odds fresh throughout group
      # stage and auto-adds knockout-round markets as Polymarket publishes them.
      - name: Fetch Polymarket match odds
        continue-on-error: true   # odds fetch failure shouldn't block a strength push
        run: node scripts/fetch-match-odds.mjs

      # ── Steps 3-5 only run when a new round was detected ─────────────────────

      - name: Compute Elo ratings and patch teamStrength.ts
        if: steps.round_check.outputs.trigger_update == 'true'
        run: node scripts/update-strengths.mjs

      - name: Update Elo state file
        if: steps.round_check.outputs.trigger_update == 'true'
        run: |
          STAGE="${{ steps.round_check.outputs.completed_stage }}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '{\n  "lastUpdatedStage": "%s",\n  "lastUpdatedAt": "%s"\n}\n' \
            "$STAGE" "$TIMESTAMP" \
            > .github/elo-update-state.json
          echo "State file updated: stage=$STAGE at $TIMESTAMP"

      - name: Show strength diff
        if: steps.round_check.outputs.trigger_update == 'true'
        run: git diff src/lib/teamStrength.ts

      # ── Step 6 (ALWAYS): commit whatever changed ─────────────────────────────
      # matchOdds.ts is always staged; teamStrength.ts + state file only when Elo ran.
      # git diff --staged --quiet exits cleanly when nothing changed (no empty commit).
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Always stage odds file
          git add src/lib/matchOdds.ts

          # Stage strength files only when Elo update ran
          TRIGGER="${{ steps.round_check.outputs.trigger_update }}"
          if [[ "$TRIGGER" == "true" ]]; then
            git add src/lib/teamStrength.ts .github/elo-update-state.json
          fi

          # Nothing changed → nothing to commit
          git diff --staged --quiet && echo "No changes to commit." && exit 0

          # Build a descriptive commit message
          if [[ "$TRIGGER" == "true" ]]; then
            STAGE="${{ steps.round_check.outputs.completed_stage }}"
            MSG="chore: update odds + strengths after ${STAGE} ($(date -u +%Y-%m-%d))"
          else
            MSG="chore: update match odds ($(date -u +%Y-%m-%d))"
          fi

          git commit -m "$MSG"
          git push
